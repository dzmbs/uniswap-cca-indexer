type Auction {
  id: ID! # auction contract address (lowercase)
  chainId: Int!
  token: String!
  currency: String!
  amount: BigInt!
  startBlock: BigInt!
  endBlock: BigInt!
  claimBlock: BigInt!
  totalSupply: BigInt!
  floorPrice: BigInt!
  tickSpacing: BigInt!
  validationHook: String!
  createdAt: BigInt!
  # Live state
  lastCheckpointedBlock: BigInt!
  lastClearingPriceQ96: BigInt!
  currencyRaised: BigInt!
  totalCleared: BigInt!
  requiredCurrencyRaised: BigInt!
  cumulativeMps: Int!
  remainingMps: BigInt!
  availableSupply: BigInt!
  currentStepMps: Int!
  currentStepStartBlock: BigInt!
  currentStepEndBlock: BigInt!
  numBids: Int!
  numBidders: Int!
  totalBidAmount: BigInt!
  updatedAt: BigInt!
}

type Bid @index(fields: ["auctionId", "maxPriceQ96"]) {
  id: ID! # {auctionAddr}:{bidId}
  auctionId: String! @index
  amount: BigInt!
  maxPriceQ96: BigInt!
  owner: String! @index
  startBlock: BigInt!
  transactionHash: String!
  tokensFilled: BigInt!
  amountFilled: BigInt!
  lastFullyFilledCheckpointBlock: BigInt!
  outbidCheckpointBlock: BigInt
  exited: Boolean!
  exitedBlock: BigInt
  exitTransactionHash: String
  claimed: Boolean!
  claimedBlock: BigInt
  claimTransactionHash: String
  tokensClaimed: BigInt!
  amountRefunded: BigInt!
}

type Tick {
  id: ID! # {auctionAddr}:{priceQ96}
  auctionId: String! @index
  priceQ96: BigInt!
  nextPriceQ96: BigInt!
  currencyDemand: BigInt!
  numBids: Int!
}

type Step {
  id: ID! # {auctionAddr}:{stepIndex}
  auctionId: String! @index
  startBlock: BigInt!
  endBlock: BigInt!
  mps: Int!
}

type Checkpoint
  @index(fields: ["auctionId", "blockNumber"])
  @index(fields: ["auctionId", "clearingPriceQ96"]) {
  id: ID! # {auctionAddr}:{blockNumber}
  auctionId: String! @index
  blockNumber: BigInt!
  clearingPriceQ96: BigInt!
  currencyRaisedAtClearingPriceQ96_X7: BigInt!
  cumulativeMps: Int!
  cumulativeMpsPerPrice: BigInt!
}
